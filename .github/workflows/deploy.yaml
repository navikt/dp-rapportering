name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/build-publish.yaml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    secrets: inherit
    with:
      push_image: ${{ github.ref == 'refs/heads/main' }} # Kjører kun push av docker image på main branch

  deploy-dev:
    name: Deploy to dev
    needs: [ build ]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev-gcp
    permissions:
        contents: read
        id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: .nais/nais.yaml,.nais/alerts.yaml,.nais/unleash-apitoken.yaml
          VAR: image=${{ needs.build.outputs.image }},githubSha=${{ github.sha }},unleashEnv=development
          VARS: .nais/vars-dev.yaml
          PRINT_PAYLOAD: true

  deploy-prod:
    name: Deploy to prod
    needs: [ build ]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod-gcp
    permissions:
        contents: read
        id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/nais.yaml,.nais/alerts.yaml,.nais/unleash-apitoken.yaml
          VAR: image=${{ needs.build.outputs.image }},githubSha=${{ github.sha }},unleashEnv=production
          VARS: .nais/vars-prod.yaml
          PRINT_PAYLOAD: true
