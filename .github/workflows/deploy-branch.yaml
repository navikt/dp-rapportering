name: Build and Deploy Branch

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to run tests against'
                type: choice
                default: dev
                options:
                    - dev
                required: true

jobs:
    build:
        uses: ./.github/workflows/build-publish.yaml
        permissions:
          contents: "read"
          checks: "write"
          pull-requests: "write"
          id-token: "write"
        secrets: inherit
        with:
            push_image: true

    deploy-branch:
        name: Deploy branch
        needs: [ build ]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        environment: ${{ inputs.environment }}-gcp
        steps:
            - uses: actions/checkout@v6
            - name: Utled Unleash-miljø
              run: |
                if [[ "${{ inputs.environment }}" == "dev" ]]; then
                    echo "UNLEASH_ENV=development" >> $GITHUB_ENV
                elif [[ "${{ inputs.environment }}" == "prod" ]]; then
                    echo "UNLEASH_ENV=production" >> $GITHUB_ENV
                else
                    echo "ENV=ukjent_unleash_environment" >> $GITHUB_ENV
                fi
            - uses: nais/deploy/actions/deploy@v2
              env:
                  CLUSTER: ${{ inputs.environment }}-gcp
                  RESOURCE: .nais/nais.yaml,.nais/alerts.yaml,.nais/unleash-apitoken.yaml
                  VAR: image=${{ needs.build.outputs.image }},githubSha=${{ github.sha }},unleashEnv=${{ env.UNLEASH_ENV}}
                  VARS: .nais/vars-${{ inputs.environment }}.yaml
                  PRINT_PAYLOAD: true
