apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: dp-rapportering
  namespace: teamdagpenger
  labels:
    team: teamdagpenger
    domene: behandling
spec:
  image: {{ image }}
  accessPolicy:
    inbound:
      rules:
        - application: dp-saksbehandling-frontend
        - application: dp-rapportering-frontend
  port: 8080
  prometheus:
    enabled: true
    path: /internal/metrics
  replicas:
    min: 1
    max: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  {{ ingresses }}
  secureLogs:
    enabled: true
  kafka:
    pool: {{ kafka_pool }}
